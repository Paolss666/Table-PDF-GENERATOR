<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842">
  <!-- A4 background -->
  <rect width="595" height="842" fill="#2C2C2C" rx="12"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="555" height="802" fill="none" stroke="#C8A96E" stroke-width="3" rx="10"/>
  <rect x="30" y="30" width="535" height="782" fill="none" stroke="#C8A96E" stroke-width="1" rx="8"/>

  <!-- Top label -->
  <text x="297" y="120" font-family="Georgia, serif" font-size="20" font-style="italic"
        fill="#C8A96E" text-anchor="middle" letter-spacing="6">TABLE</text>

  <!-- Horizontal divider top -->
  <line x1="80" y1="140" x2="515" y2="140" stroke="#C8A96E" stroke-width="1"/>

  <!-- ── TABLE NUMBER ZONE: center at y=295 (35% of 842) ── -->
  <!-- code injects the number here — leave this area empty  -->

  <!-- ── QR CODE ZONE: center at y=463 (55% of 842)       -->
  <!-- QR size ≈ 198×198px, so top at y=364, bottom y=562  -->
  <rect x="199" y="364" width="198" height="198"
        fill="none" stroke="#555555" stroke-width="1" stroke-dasharray="4 4" rx="4"/>
  <text x="297" y="590" font-family="Arial, sans-serif" font-size="11" letter-spacing="3"
        fill="#666666" text-anchor="middle">SCAN FOR MENU</text>

  <!-- Horizontal divider bottom -->
  <line x1="80" y1="630" x2="515" y2="630" stroke="#C8A96E" stroke-width="1"/>

  <!-- Restaurant name bottom -->
  <text x="297" y="680" font-family="Georgia, serif" font-size="22" font-weight="bold"
        fill="#C8A96E" text-anchor="middle" letter-spacing="3">THE KITCHEN</text>
  <text x="297" y="710" font-family="Georgia, serif" font-size="14" font-style="italic"
        fill="#888" text-anchor="middle">thekitchen.co.uk</text>
</svg>
